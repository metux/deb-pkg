# container tools: runc, containerd, containerd-cgroups, docker-cli, nerdctl.
#
# Targets excalibur (current Devuan stable) and newer. Their native golang
# toolchain is >= 1.22, which satisfies every package's Build-Depends:
#   - runc:               golang-any (>= 1.19)
#   - containerd:         golang-any (>= 1.20)
#   - containerd-cgroups: golang-any (>= 1.18)
#   - docker-cli:         golang-any (>= 1.18~)
#   - nerdctl:            golang-any (>= 1.20)
# All depend on golang-any (no pinned golang-1.NN), so the distro's native
# golang is enough and no golang toolchain bootstrap is needed.
#
# Older releases (beowulf/chimaera/daedalus) are dropped: they needed a
# bootstrapped golang toolchain (golang-defaults/golang-go) which no longer
# builds (Go 1.20.7's hardcoded crypto/tls testdata certs have expired).

targets:
    - devuan/excalibur/amd64
    - devuan/excalibur/i386
    - devuan/testing/amd64
    - devuan/testing/i386
    - devuan/unstable/amd64
    - devuan/unstable/i386

defaults:
    packages:
        autobuild-ref:    oss-qm/debian/maint-${package.version}
        autobuild-local:  debian/maint-${package.version}

packages:

### container tools

    runc@master:

    containerd-cgroups@master:

    containerd@master:
        depends:
            - runc@master

    docker-cli@master:

    nerdctl@master:

pools:
    default:
        packages:
            - runc@master
            - containerd-cgroups@master
            - containerd@master
            - nerdctl@master
            - docker-cli@master
