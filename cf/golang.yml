pathes:
    csdb-path:              cf/csdb

targets:
    - dng-ascii-i386

packages:

    golang@1.7.4:
        autobuild-branch:   oss-qm/debian/maint-${package.version}

    golang@1.10.4:
        autobuild-branch:   oss-qm/debian/maint-${package.version}

    golang@1.11.1:
        autobuild-branch:   oss-qm/debian/maint-${package.version}

    golang@1.11.2:
        autobuild-branch:   oss-qm/debian/maint-${package.version}

    golang-defaults:
        my-url:             git@github.com:oss-qm/debian.golang-defaults.git
        autobuild-branch:   my/master

pools:

    default:
        packages:
            - golang@1.11.1
            - golang-defaults

# configuration for automatically fetching the dck-buildpackage tool
dck-buildpackage:
    - git-url:      git@github.com:metux/docker-buildpackage.git
    - git-branch:   master
