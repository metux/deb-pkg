name: autobuild

on:
  push:
    branches:
      - master
      - 'release/**'
      - 'submit/**'
      - 'testing/**'
      - 'wip/**'
  pull_request:
  workflow_dispatch:

jobs:
  bootstrap:
    name: bootstrap rootfs
    runs-on: ubuntu-22.04
    timeout-minutes: 1440
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-worker

      - name: Build all base images
        run: find cf/repos/ -name "*.yml" -exec "./repo-build-baseimage" "{}" ";"

      - name: Upload rootfs tarballs
        uses: actions/upload-artifact@v6
        with:
          name: rootfs-tarballs
          path: /tmp/dck-buildpackage/debootstrap-tarballs/
          if-no-files-found: ignore

  build:
    needs: bootstrap
    permissions:
      pages: write
      id-token: write
    strategy:
      matrix:
        os: [ ubuntu-22.04, ubuntu-24.04, ubuntu-26.04, ubuntu-latest ]
    name: build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 1440
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-worker

      - name: Download rootfs tarballs
        uses: actions/download-artifact@v6
        with:
          name: rootfs-tarballs
          path: /tmp/dck-buildpackage/debootstrap-tarballs/

      - name: Import base images from tarballs
        run: find cf/repos/ -name "*.yml" -exec "./repo-build-baseimage" "{}" ";"

      - name: Cache apt repo and state files
        id: cache-repo
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.aptrepo
            ${{ github.workspace }}/.stat
          key: repobuild-${{ matrix.os }}+${{ github.ref_name }}@${{ env.CONFIG_HASH }}
          restore-keys: |
            repobuild-${{ matrix.os }}+${{ github.ref_name }}@${{ env.CONFIG_HASH }}
            repobuild-${{ matrix.os }}+${{ github.ref_name }}@

      - name: Run builders
        run: |
          for scr in ./build.* ; do
            if [ -x $scr ]; then
              echo "---> Calling builder: $scr"
              $scr || exit $?
            fi
          done
        env:
          DEBPKG_GITHUB_ANONYMOUS: 1

      - name: Generate index pages
        if: github.ref_name == 'master' && github.event_name == 'push' && matrix.os == 'ubuntu-22.04'
        run: .github/scripts/gen-index-pages.sh

      - name: Upload Pages artifact
        if: github.ref_name == 'master' && github.event_name == 'push' && matrix.os == 'ubuntu-22.04'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .aptrepo

  deploy:
    if: github.ref_name == 'master' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
