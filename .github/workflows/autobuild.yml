name: autobuild

on:
  push:
    branches:
      - master
      - 'release/**'
      - 'submit/**'
      - 'testing/**'
      - 'wip/**'
  pull_request:
  workflow_dispatch:

jobs:
  bootstrap:
    name: bootstrap rootfs
    runs-on: ubuntu-22.04
    timeout-minutes: 1440
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-worker

      - name: Build all base images
        run: find cf/repos/ -name "*.yml" -exec "./repo-build-baseimage" "{}" ";"

      - name: Upload rootfs tarballs
        uses: actions/upload-artifact@v6
        with:
          name: rootfs-tarballs
          path: /tmp/dck-buildpackage/debootstrap-tarballs/
          if-no-files-found: ignore

  # Emit the build matrix (one entry per config-file x pool) from cf/repos/*.yml,
  # so the package build below fans out into parallel jobs - one per repo/pool
  # across all its target distro/arch combinations.
  matrix:
    name: generate build matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Install PyYAML
        run: sudo apt-get install -y python3-yaml
        env:
          DEBIAN_FRONTEND: noninteractive
      - name: Generate matrix
        id: gen
        run: python3 .github/scripts/gen-build-matrix.py

  build:
    needs: [ bootstrap, matrix ]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    name: build ${{ matrix.name }}
    runs-on: ubuntu-22.04
    timeout-minutes: 1440
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-worker

      - name: Download rootfs tarballs
        uses: actions/download-artifact@v6
        with:
          name: rootfs-tarballs
          path: /tmp/dck-buildpackage/debootstrap-tarballs/

      - name: Import base images from tarballs
        run: ./repo-build-baseimage "${{ matrix.config }}"

      - name: Cache apt repo and state files
        id: cache-repo
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.aptrepo
            ${{ github.workspace }}/.stat
          key: repobuild-${{ matrix.artifact }}+${{ github.ref_name }}@${{ env.CONFIG_HASH }}
          restore-keys: |
            repobuild-${{ matrix.artifact }}+${{ github.ref_name }}@${{ env.CONFIG_HASH }}
            repobuild-${{ matrix.artifact }}+${{ github.ref_name }}@

      - name: Run builder
        run: ./repo-build-pool "${{ matrix.config }}" "${{ matrix.pool }}"
        env:
          DEBPKG_GITHUB_ANONYMOUS: 1

      - name: Upload apt repo artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: .aptrepo
          if-no-files-found: ignore

  # Aggregate the per-pool apt repos from all parallel build jobs into one
  # .aptrepo tree, generate the index pages, and hand it to the Pages deploy.
  publish:
    if: github.ref_name == 'master' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all apt repo artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: aptrepo-*
          path: .aptrepo-parts
          merge-multiple: true

      - name: Merge apt repos
        run: |
          mkdir -p .aptrepo
          if [ -d .aptrepo-parts ]; then
            cp -a .aptrepo-parts/. .aptrepo/
          fi

      - name: Generate index pages
        run: .github/scripts/gen-index-pages.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .aptrepo

  deploy:
    if: github.ref_name == 'master' && github.event_name == 'push'
    needs: publish
    runs-on: ubuntu-22.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
